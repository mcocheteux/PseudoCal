# PseudoPillars with LiDAR-anchored depth-scale alignment (research variant).
#
# Same coarse stage as `pseudopillars`, but the pseudo-LiDAR is rescaled to match the real
# LiDAR's range distribution before pillarisation, making calibration robust to monocular
# metric-depth scale drift. Pair with `data=kitti_pillars`.
#
# Sensitivity sweep:   +model.scale_bias=0.8 (inject a -20% depth-scale error at eval)
# Train augmentation:  +model.scale_jitter=0.1 (±10% random scale per sample)

defaults:
  - pseudopillars
  - _self_

# none | range | range+residual
scale_align: range+residual
scale_jitter: 0.0
scale_bias:   1.0
