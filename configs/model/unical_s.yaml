# UniCal-S — fine-range residual refiner (third / final cascade stage).
#
# Identical UniCal++ architecture to UniCal-M; the "S" stage is trained on the
# small decalibration range from configs/data/kitti_s.yaml (±1°/±10 cm).

_target_: unical.models.module.UniCal

lr:            3.0e-5
weight_decay:  1.0e-4
warmup_epochs: 5

backbone:
  _target_: unical.models.backbone.MobileViTBackbone
  img_channels:        3
  lidar_channels:      1
  image_size:          512
  hidden_sizes:        [144, 192, 240]
  num_attention_heads: 4
  patch_size:          2
  conv_kernel_size:    3
  pretrained:          apple/mobilevit-small
  spatial_head:        true

head:
  _target_: unical.models.head.SplitRegressionHead
  in_features:   640
  common_hidden: []
  trans_hidden:  [640, 256]
  rot_hidden:    [640, 256]
  rot_dim:       6

loss:
  _target_: unical.losses.combined.CombinedLoss
  regression:
    _target_: unical.losses.regression.RegressionLoss
    trans_weight: 1.0
    rot_weight:   1.0
  spatial:
    _target_: unical.losses.spatial.SpatialLoss
    centroid_weight: 1.0
    pcl_weight:      1.0
