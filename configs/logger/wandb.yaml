# Weights & Biases logger.
#
# Requirements:
#   * install the logger extra:  uv sync --extra logger
#   * authenticate: set the WANDB_API_KEY env var (or run `wandb login`)
#
# Logs all scalar metrics (train/val/test loss + calibration MAE/STD) as charts, the
# resolved hyperparameters, and — with log_model=true — the best and last checkpoints
# as a versioned W&B artifact.
_target_: pytorch_lightning.loggers.WandbLogger
project:   pseudocal
entity:    null          # set to your W&B team/username, or leave null for default
name:      ${stage}      # run name = the stage being trained (pseudopillars/unical_m/unical_s)
save_dir:  ${log_dir}
log_model: true
