name: Secret Scan

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly full-history audit, Monday 06:00 UTC
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all --tags

      - name: Install gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan full history across all branches
        run: gitleaks detect --source . --log-opts="--all" --redact --verbose --no-banner
